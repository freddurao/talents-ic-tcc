version: '3.9'

services:
  db:
    image: mysql
    container_name: talentic-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - db_talentic:/var/lib/mysql
    ports:
      - '3306:3306'
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -p$DATABASE_PASSWORD -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer
    container_name: talentic-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  backend:
    build:
      context: .
    container_name: talentic-worker
    restart: unless-stopped
    ports:
      - '5001:5000'
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: root
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [
        "CMD",
        "node",
        "-e",
        "require('http').get('http://localhost:5000/health-check', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../talentos-ic-tcc-front
    container_name: talentic-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API: http://localhost:5001
      HOME_URL: http://localhost:3000
    volumes:
      - ../talentos-ic-tcc-front:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_talentic: