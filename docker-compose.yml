version: '3.9'

services:
  db:
    image: postgres:latest
    container_name: talentic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - db_talentic:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: .
    container_name: talentic-worker
    restart: unless-stopped
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [
        "CMD",
        "node",
        "-e",
        "require('http').get('http://localhost:5000/health-check', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../talentos-ic-tcc-front
    container_name: talentic-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API: http://localhost:5001
      HOME_URL: http://localhost:3000
    volumes:
      - ../talentos-ic-tcc-front:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_talentic: